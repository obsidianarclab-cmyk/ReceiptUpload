<!DOCTYPE html>
<html>
<head>
  <title>OBSIDIAN ARC LAB - Receipt Upload</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      width: 90%;
      max-width: 450px;
      border-radius: 12px;
      border-top: 6px solid #b5a642;
      text-align: center;
    }

    .brand {
      color: #b5a642;
      font-weight: bold;
      margin-bottom: 10px;
    }

    h3 {
      margin-bottom: 10px;
    }

    .section-title {
      text-align: left;
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    textarea {
      height: 70px;
      resize: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #b5a642;
      color: black;
    }

    /* 🔥 LOADING STYLE */
    .loading {
      display: none;
      margin-top: 10px;
      color: #b5a642;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">

  <div class="brand">OBSIDIAN ARC LAB</div>
  <h3>Upload Receipt</h3>

  <div class="section-title">Order Details</div>
  <input type="text" id="orderId" placeholder="Order ID/Product Name (e.g. ORD001/Mini Ganesha Statue)">

  <div class="section-title">Receiver Details</div>
  <input type="text" id="name" placeholder="Receiver Name">
  <input type="text" id="phone" placeholder="Receiver Phone">
  <textarea id="address" placeholder="Address"></textarea>

  <div class="section-title">Payment By</div>
  <input type="text" id="payerName" placeholder="Your Name">
  <input type="text" id="payerPhone" placeholder="Your Phone">

  <input type="file" id="file">

  <button class="btn" id="btn" onclick="upload()">Submit</button>

  <!-- 🔥 LOADING MESSAGE -->
  <div class="loading" id="loading">Uploading... Please wait ⏳</div>

</div>

<script>

function upload() {

  const orderId = document.getElementById("orderId").value;
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const payerName = document.getElementById("payerName").value;
  const payerPhone = document.getElementById("payerPhone").value;
  const file = document.getElementById("file").files[0];

  if (!orderId || !name || !phone || !address || !payerName || !payerPhone || !file) {
    alert("Please fill all fields");
    return;
  }

  // 🔥 SHOW LOADING
  document.getElementById("loading").style.display = "block";
  document.getElementById("btn").disabled = true;

  const reader = new FileReader();

  reader.onload = function(e) {

    fetch("https://script.google.com/macros/s/AKfycbzmTD4ct44yQVxZ2H6yoX8JYbSiyVyot-Ge-YHLnvmqhNuC8V_flpQpZewfVrE9OR81/exec", {
      method: "POST",
      body: new URLSearchParams({
        orderId: orderId,
        name: name,
        phone: phone,
        address: address,
        payerName: payerName,
        payerPhone: payerPhone,
        file: e.target.result
      })
    })
    .then(() => {

      alert("Upload Successful!");

      // reset form
      document.getElementById("orderId").value = "";
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("address").value = "";
      document.getElementById("payerName").value = "";
      document.getElementById("payerPhone").value = "";
      document.getElementById("file").value = "";

      // 🔥 HIDE LOADING
      document.getElementById("loading").style.display = "none";
      document.getElementById("btn").disabled = false;

    })
    .catch(() => {
      alert("Upload Failed");

      document.getElementById("loading").style.display = "none";
      document.getElementById("btn").disabled = false;
    });

  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
